<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nettoyage du cache</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; background: #f0f0f0; }
    .box { background: white; border-radius: 16px; padding: 32px; max-width: 400px; text-align: center;
           box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #666; font-size: .9rem; margin-bottom: 20px; line-height: 1.5; }
    button { background: #2D6A4F; color: white; border: none; border-radius: 10px;
             padding: 14px 28px; font-size: 1rem; cursor: pointer; font-weight: 700; width: 100%; }
    button:hover { background: #52B788; }
    .status { margin-top: 16px; font-size: .85rem; color: #2D6A4F; min-height: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:2.5rem;margin-bottom:12px">🗑️</div>
    <h1>Nettoyage du cache</h1>
    <p>Si l'application affiche une page blanche ou ne se met pas à jour, cliquez sur ce bouton pour vider le cache du Service Worker.</p>
    <button onclick="clearAll()">Vider le cache et recharger</button>
    <div class="status" id="status"></div>
  </div>
  <script>
    async function clearAll() {
      const status = document.getElementById('status');
      status.textContent = '⏳ Nettoyage en cours…';
      try {
        // Désinscrire tous les Service Workers
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) { await reg.unregister(); }
        }
        // Vider tous les caches
        if ('caches' in window) {
          const keys = await caches.keys();
          for (const key of keys) { await caches.delete(key); }
        }
        status.textContent = '✅ Cache vidé ! Rechargement…';
        setTimeout(() => { window.location.href = './'; }, 1000);
      } catch(e) {
        status.textContent = '❌ Erreur : ' + e.message;
      }
    }
  </script>
</body>
</html>
